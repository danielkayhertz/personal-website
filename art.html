// ── Render gallery ──

const gallery = document.getElementById('gallery');

artists.forEach(artist => {
  const section = document.createElement('section');

  const h2 = document.createElement('h2');
  h2.textContent = artist.name;
  section.appendChild(h2);

  const wrap = document.createElement('div');
  wrap.className = 'shelf-wrap';

  const shelf = document.createElement('div');
  shelf.className = 'shelf';

  artist.images.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'shelf-item';
    btn.type = 'button';

    const figure = document.createElement('figure');

    const img = document.createElement('img');
    img.src = `Art/${item.file}`;
    img.alt = item.caption
      ? `${artist.name} — ${item.caption}`
      : artist.name;
    img.loading = 'lazy';
    img.decoding = 'async';
    img.onerror = () => { figure.style.display = 'none'; };

    figure.appendChild(img);

    if (item.caption) {
      const figcap = document.createElement('figcaption');
      figcap.textContent = item.caption;
      figure.appendChild(figcap);
    }

    btn.appendChild(figure);
    btn.addEventListener('click', () => openLightbox(img.src, img.alt, btn));

    shelf.appendChild(btn);
  });

  wrap.appendChild(shelf);
  section.appendChild(wrap);
  gallery.appendChild(section);
});

// ── Lightbox ──

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxClose = document.getElementById('lightboxClose');
let lastTrigger = null;

function openLightbox(src, altText, trigger) {
  lastTrigger = trigger;
  lightboxImg.src = src;
  lightboxImg.alt = altText;
  lightbox.classList.remove('hidden');
  lightboxClose.focus();
  document.addEventListener('keydown', handleLightboxKey);
}

function closeLightbox() {
  lightbox.classList.add('hidden');
  lightboxImg.src = '';
  document.removeEventListener('keydown', handleLightboxKey);
  if (lastTrigger) lastTrigger.focus();
}

function handleLightboxKey(e) {
  if (e.key === 'Escape') {
    closeLightbox();
  } else if (e.key === 'Tab') {
    // Only the close button is focusable inside the lightbox
    e.preventDefault();
    lightboxClose.focus();
  }
}

// Close on overlay click, but not on image click
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) closeLightbox();
});

lightboxClose.addEventListener('click', closeLightbox);
</script>
